<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To Do List</title>
    <style>
        body{
            background-color: #ccf2f4;
        }
        .head{
            text-align: center;
        }
        .todo{
            color: pink;
            font-size: 50px;
            text-align: center
        }
        .havetodo{
            text-align: center;
            border-radius: 10px;
            border: 2px solid #51c2d5;
        }
        .submit{
            border-radius: 10px;
            background-color: #a4ebf3;
            color: white;
            border: 2px solid #51c2d5;
        }
    </style>
</head>
<body>
    <div class="head">
        <h1 class="todo">To Do List</h1>
        <input id="textTodo" type="text" placeholder="สิ่งที่ต้องทำ" class="havetodo">
        <button class="submit" id="submitbutton">Submit</button>
        <ul id="ul">
        </ul>
    </div>
    <script>
        let ul = document.getElementById("ul")
        let inputTodo = document.getElementById("textTodo")
        let btnsubmit = document.getElementById("submitbutton")
        btnsubmit.addEventListener("click", function(){

            let newItem = document.createElement("li")
            let text = document.createElement("span")
            let edite = document.createElement("button")
            let deletebtn = document.createElement("button")

            edite.textContent = "edite"
            deletebtn.textContent = "delete"
            newItem.textContent = inputTodo.value

            newItem.appendChild(text)
            newItem.appendChild(edite)
            newItem.appendChild(deletebtn)

            edite.addEventListener("click", function(){
                let newText = prompt("edite" , text.textContent)
                if (newText !== null && newText.trim() !== "") {
                    newItem.textContent = newText
                }
                newItem.appendChild(edite)
                newItem.appendChild(deletebtn)                
            })

            deletebtn.addEventListener("click", function(){
                newItem.remove()
            })

            ul.appendChild(newItem)
            inputTodo.value = ""
        })
        inputTodo.addEventListener("keydown", function(e){
            if(e.key === "Enter"){
                btnsubmit.click()
            }
        })
    </script>
</body>
</html>
